name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install buildifier
        run: |
          wget -qO /usr/local/bin/buildifier \
            https://github.com/bazelbuild/buildtools/releases/download/v8.0.3/buildifier-linux-amd64
          chmod +x /usr/local/bin/buildifier
      - name: Check formatting and lint
        run: buildifier -mode=check -lint=warn -r .

  build-and-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: rules_vmtest

      # rules_vmtest depends on sibling modules via local_path_override
      - uses: actions/checkout@v4
        with:
          repository: mikn/rules_linux
          path: rules_linux

      - uses: actions/checkout@v4
        with:
          repository: mikn/rules_qemu
          path: rules_qemu

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('rules_vmtest/MODULE.bazel', 'rules_vmtest/MODULE.bazel.lock') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Build
        working-directory: rules_vmtest
        run: bazel build --config=ci //...

      - name: Test
        working-directory: rules_vmtest
        run: bazel test --config=ci //...

  build-and-test-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          path: rules_vmtest

      # rules_vmtest depends on sibling modules via local_path_override
      - uses: actions/checkout@v4
        with:
          repository: mikn/rules_linux
          path: rules_linux

      - uses: actions/checkout@v4
        with:
          repository: mikn/rules_qemu
          path: rules_qemu

      - name: Install QEMU and build dependencies
        run: brew install qemu autoconf automake libtool pkg-config

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('rules_vmtest/MODULE.bazel', 'rules_vmtest/MODULE.bazel.lock') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Build
        working-directory: rules_vmtest
        run: bazel build --config=ci //...

      - name: Test
        working-directory: rules_vmtest
        run: bazel test --config=ci //...
