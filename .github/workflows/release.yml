name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify MODULE.bazel version
        run: |
          module_version=$(grep -oP 'version = "\K[^"]+' MODULE.bazel)
          if [ "$module_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: MODULE.bazel version ($module_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Create source archive
        run: |
          prefix="rules_vmtest-${{ steps.version.outputs.version }}"
          git archive --format=tar.gz --prefix="${prefix}/" HEAD -o "${prefix}.tar.gz"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "rules_vmtest-${{ steps.version.outputs.version }}.tar.gz"
          generate_release_notes: true
