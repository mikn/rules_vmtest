name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  id-token: write
  attestations: write
  contents: write

jobs:
  release:
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@v7.4.0
    with:
      release_files: rules_vmtest-*.tar.gz
      prerelease: false

  publish:
    needs: release
    uses: ./.github/workflows/publish.yml
    with:
      tag_name: ${{ github.ref_name }}
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
